---
- name: Deploy Spring Boot App as Docker Container
  hosts: appserver
  become: yes

  vars:
    docker_image: "dockersiva003/spring-devops-app:latest"
    container_name: "spring-devops-app"
    app_port: 8080

  # 🔐 Load encrypted secrets
  vars_files:
    - secrets.yml

  tasks:

    # TASK 1: Install pip3 (optional, can keep/remove)
    - name: Install pip3
      apt:
        name: python3-pip
        state: present
        update_cache: yes

    # 🔐 NEW: Login to Docker Hub (for private repo)
    - name: Login to Docker Hub
      shell: echo "{{ docker_pass }}" | docker login -u "{{ docker_user }}" --password-stdin

    # TASK 2: Stop and remove existing container if running
    - name: Stop existing container
      shell: docker stop {{ container_name }} || true

    - name: Remove existing container
      shell: docker rm {{ container_name }} || true

    # TASK 3: Remove old image to force fresh pull
    - name: Remove old Docker image
      shell: docker rmi {{ docker_image }} || true

    # TASK 4: Pull latest image from Docker Hub (PRIVATE now works)
    - name: Pull latest Docker image
      shell: docker pull {{ docker_image }}

    # TASK 5: Run the new container
    - name: Run Docker container
      shell: >
        docker run -d
        --name {{ container_name }}
        -p {{ app_port }}:{{ app_port }}
        --restart always
        {{ docker_image }}

    # TASK 6: Verify container is running
    - name: Check container is running
      shell: docker ps | grep {{ container_name }}
      register: container_status

    - name: Show container status
      debug:
        msg: "{{ container_status.stdout }}"